---
services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable_freqai
    # image: freqtradeorg/freqtrade:develop
    # Use plotting image
    # image: freqtradeorg/freqtrade:develop_plot
    # # Enable GPU Image and GPU Resources (only relevant for freqAI)
    # # Make sure to uncomment the whole deploy section
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # Build step - only needed when additional dependencies are needed
    # build:
    #   context: .
    #   dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: kfreqai
    volumes:
      - "./user_data:/freqtrade/user_data"
    # Expose api on port 18313 (kurageプロジェクトの18300番台規則。kurage.exbridge.jp側の
    # PHPダッシュボードがexbridge.ddns.net:18313経由でサーバーサイドから叩く。ブラウザに直接
    # 晒すエンドポイントではないので、CORS_originsは空のまま・トークンもPHP側だけが保持する)
    # Please read the https://www.freqtrade.io/en/stable/rest-api/ documentation
    # for more information.
    ports:
      - "18313:18313"
    # Default command used when running `docker compose up`. KfreqaiDefaultStrategy
    # is a published no-op placeholder (see user_data/strategies/kfreqai_default_strategy.py) --
    # this repo's real live strategy is not published. Production overrides this
    # command via docker-compose.override.yml (gitignored, see .example) rather than
    # editing this file, so a clone always gets the safe default.
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy KfreqaiDefaultStrategy
